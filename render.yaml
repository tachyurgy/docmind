services:
  - type: web
    name: docmind
    runtime: docker
    repo: https://github.com/tachyurgy/docmind
    envVars:
      # DATABASE_URL points at the shared Supabase "rag-apps" project.
      # Set manually in Render: postgresql+asyncpg://dm_app.lndmgmmtsnysihtfcvnj:PW@aws-1-us-east-2.pooler.supabase.com:6543/postgres
      # The dm_app role's search_path is pinned to the docmind schema.
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true
    healthCheckPath: /health
